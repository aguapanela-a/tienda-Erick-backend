#spring.profiles.active=local
spring.application.name=tiendaErick
server.port=8087

spring.jackson.datatype.enum.write-enums-to-lowercase=true
spring.jackson.mapper.accept-case-insensitive-enums=true
spring.jackson.datatype.enum.read-unknown-enum-values-as-null=true

##Conexiïŋ―n a la BD
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

##Se encarga de abrir la conexiïŋ―n fïŋ―sica, enviar las consultas SQL y traducir los resultados que devuelve la base de datos a un formato que Java entienda.
spring.datasource.driver-class-name=org.postgresql.Driver

##Crea y actualiza tablas automïŋ―ticamente
spring.jpa.hibernate.ddl-auto=update

##Muestra en consola lo que hace hibernate debajo
spring.jpa.show-sql=true

##JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

## ConmtraseÃąas
mama.pass=${PASS_MAMA}
papa.pass=${PASS_PAPA}
eri.pass=${PASS_ERI}
hermana.pass=${PASS_HERMANA}